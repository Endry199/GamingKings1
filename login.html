<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - GamingKings</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
<style>
    /* Estilos específicos para centrar la caja de login */
    .login-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh; /* Ocupa toda la altura de la ventana */
        background-color: var(--bg-color); 
    }
    .login-box {
        background-color: var(--card-bg);
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 4px 15px var(--shadow-dark);
        text-align: center;
        width: 90%;
        max-width: 400px;
    }
    .login-box h1 {
        color: var(--text-color);
        margin-bottom: 30px;
        font-size: 1.8em;
    }
    /* Contenedor donde se renderizará el botón de Google */
    #google-login-btn {
        margin-top: 20px;
        display: flex; /* Nuevo: Usa Flexbox para centrar */
        justify-content: center; /* Nuevo: Centra el contenido */
    }
</style>
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <a href="index.html">
                <img src="images/gamingkings_logo.png" alt="GamingKings Logo" style="width: 150px; margin-bottom: 20px;">
            </a>
            <h1>Inicia Sesión</h1>
            <p style="color: var(--secondary-text); margin-bottom: 25px;">Usa tu cuenta de Google para acceder.</p>
            
            <div id="google-login-btn"></div>

        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
        <script>
    // Esta función es la que se ejecuta cuando process-google-login devuelve éxito (código 200)
    function handleLoginSuccess(responseJSON) {
        console.log("✅ Autenticación exitosa:", responseJSON);

        // 1. Guardas el token tal cual como lo tienes implementado
        // (Asegúrate de guardar tanto sessionToken como session_token si usas ambas en tu script.js)
        localStorage.setItem("sessionToken", responseJSON.sessionToken);
        localStorage.setItem("session_token", responseJSON.sessionToken); 
        
        // Guardamos también los datos del usuario si tu app lo requiere
        if (responseJSON.user) {
            localStorage.setItem("user_data", JSON.stringify(responseJSON.user));
        }

        // 2. 🎯 AQUÍ ESTÁ EL TRUCO CLAVE PARA REFRESCAR Y REDIRECCIONAR:
        const urlDestino = localStorage.getItem("redirectAfterLogin");

        if (urlDestino) {
            console.log(`➡️ Redirigiendo al usuario a su destino previo: ${urlDestino}`);
            // Borramos la variable para que no se quede atrapada en el próximo login
            localStorage.removeItem("redirectAfterLogin");
            // Redirección directa
            window.location.href = urlDestino;
        } else {
            console.log("➡️ No hay destino previo. Redirigiendo a la página principal por defecto.");
            window.location.href = "index.html";
        }
    }

    // NOTA: Integra la llamada a 'handleLoginSuccess' dentro de tu función actual 
    // que procesa el fetch a /.netlify/functions/process-google-login cuando 'response.ok' sea true.
</script>
    <script src="script.js"></script>
</body>
</html>
