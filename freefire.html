<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Free Fire Diamonds - GamingKings</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">

    <style>
        /* --- ESTILOS ENBEBIDOS (CSS) --- */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color, #121214);
            color: var(--text-color, #ffffff);
        }

        /* Header de usuario / Control de Saldo */
        .ff-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background-color: var(--card-bg, #1a1a1e);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            flex-wrap: wrap;
            gap: 10px;
        }

        .back-btn {
            color: var(--primary-color, #a72885);
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .balance-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid rgba(167, 40, 133, 0.3);
        }

        .balance-amount {
            font-weight: bold;
            color: #2ecc71;
            margin-right: 10px;
        }

        .add-balance-btn {
            background-color: var(--primary-color, #a72885);
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: transform 0.2s;
        }

        .add-balance-btn:hover {
            transform: scale(1.1);
        }

        /* Grid de Productos */
        .ff-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
        }

        .ff-title {
            font-size: 2em;
            margin-bottom: 30px;
            color: var(--text-color, #fff);
            text-shadow: 0 0 10px rgba(167, 40, 133, 0.5);
        }

        .packages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .package-card {
            background-color: var(--card-bg, #1a1a1e);
            border-radius: 12px;
            padding: 25px 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s, border-color 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .package-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color, #a72885);
        }

        .package-icon {
            font-size: 3rem;
            color: #f1c40f;
            margin-bottom: 15px;
        }

        .package-name {
            font-size: 1.3rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .package-price {
            font-size: 1.5rem;
            color: #2ecc71;
            font-weight: bold;
            margin: 15px 0;
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 10px 0 15px 0;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 15px;
            border-radius: 8px;
        }

        .quantity-selector label {
            font-size: 0.9rem;
            color: var(--text-color, #fff);
        }

        .quantity-selector input {
            width: 60px;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid rgba(167, 40, 133, 0.3);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 1rem;
            text-align: center;
        }

        .quantity-selector input:focus {
            outline: none;
            border-color: var(--primary-color, #a72885);
        }

        .quantity-selector .qty-btn {
            background: var(--primary-color, #a72885);
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .quantity-selector .qty-btn:hover {
            background: #891f6c;
        }

        .total-price {
            font-size: 1.1rem;
            color: #f1c40f;
            margin-bottom: 10px;
        }

        .buy-btn {
            background-color: var(--primary-color, #a72885);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }

        .buy-btn:hover {
            background-color: #891f6c;
        }

        .buy-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Modal de Pines */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg, #1a1a1e);
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            border: 1px solid rgba(167, 40, 133, 0.3);
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .modal-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #f1c40f;
        }

        .pin-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .pin-code {
            font-family: monospace;
            font-size: 1.1rem;
            color: #2ecc71;
            font-weight: bold;
            word-break: break-all;
        }

        .copy-btn {
            background: var(--primary-color, #a72885);
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            flex-shrink: 0;
            margin-left: 10px;
        }

        .copy-btn:hover {
            background: #891f6c;
        }

        .modal-success-icon {
            font-size: 4rem;
            color: #2ecc71;
            text-align: center;
            margin-bottom: 15px;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary-color, #a72885);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            text-align: center;
            padding: 30px;
        }

        .loading-text p {
            margin-top: 15px;
            color: var(--text-color, #fff);
        }

        .error-text {
            text-align: center;
            padding: 20px;
            color: #ff6b6b;
        }

        .error-text i {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .email-warning {
            background: rgba(241, 196, 15, 0.15);
            border: 1px solid #f1c40f;
            border-radius: 8px;
            padding: 12px;
            margin: 15px 0;
            color: #f1c40f;
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .ff-header {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            
            .balance-box {
                justify-content: center;
            }
            
            .packages-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header class="ff-header">
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Volver al Inicio
        </a>
        <div class="balance-box">
            <span>Saldo Wallet: &nbsp;</span>
            <span class="balance-amount" id="user-balance-display">$.--</span>
            <button class="add-balance-btn" onclick="location.href='rechargedwallet.html';" title="Recargar Saldo">
                <i class="fas fa-plus"></i>
            </button>
        </div>
    </header>

    <main class="ff-container">
        <h1 class="ff-title"><i class="fire-icon fas fa-fire"></i> Diamantes Free Fire (PINs)</h1>
        
        <div class="packages-grid" id="packages-container"></div>
    </main>

    <!-- Modal para mostrar los PINs -->
    <div class="modal-overlay" id="pins-modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closePinsModal()">&times;</button>
            <div id="modal-body">
                <div class="modal-success-icon">🎮</div>
                <h2 class="modal-title" id="modal-title">¡Compra Exitosa!</h2>
                <div id="pins-list"></div>
                <div id="modal-footer" style="text-align: center; margin-top: 20px;">
                    <button onclick="closePinsModal()" class="buy-btn" style="width: auto; padding: 10px 30px;">
                        <i class="fas fa-check"></i> Aceptar
                    </button>
                </div>
            </div>
        </div>
    </div>

<script>
        // Mapeo de productos con sus IDs de proveedor
        const ffPackages = [
            { id: 1, name: "100 + 10 Diamantes", price: 0.84, sku: "FF100", provider_id: 1 },
            { id: 2, name: "310 + 31 Diamantes", price: 2.80, sku: "FF310", provider_id: 2 },
            { id: 3, name: "520 + 52 Diamantes", price: 3.82, sku: "FF520", provider_id: 3 },
            { id: 4, name: "1060 + 106 Diamantes", price: 7.09, sku: "FF1060", provider_id: 4 },
            { id: 5, name: "2180 + 218 Diamantes", price: 14.02, sku: "FF2180", provider_id: 5 },
            { id: 6, name: "5600 + 560 Diamantes", price: 35.62, sku: "FF5600", provider_id: 6 }
        ];

        let userBalance = 0.00;

        document.addEventListener("DOMContentLoaded", async () => {
            const token = localStorage.getItem("userSessionToken");
            
            if (!token) {
                console.log("❌ Sesión no detectada en localStorage. Redireccionando...");
                localStorage.setItem("redirectAfterLogin", window.location.pathname);
                window.location.href = "login.html";
                return;
            }

            console.log("✅ Token detectado en el frontend, validando con el servidor...");
            await fetchUserBalance(token);
            renderPackages();
        });

        async function fetchUserBalance(token) {
            try {
                const response = await fetch('/.netlify/functions/get-user-balance', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    console.log("📊 Datos de saldo recibidos del servidor:", data);
                    
                    userBalance = parseFloat(data.saldo || 0);
                    document.getElementById('user-balance-display').innerText = `$${userBalance.toFixed(2)}`;
                } else if (response.status === 401) {
                    console.error("❌ Token expirado o inválido. Redirigiendo a login...");
                    localStorage.removeItem("userSessionToken");
                    localStorage.removeItem("userData");
                    localStorage.setItem("redirectAfterLogin", window.location.pathname);
                    window.location.href = "login.html";
                } else {
                    console.error(`❌ El servidor respondió con estado: ${response.status}`);
                    document.getElementById('user-balance-display').innerText = "$--.--";
                }
            } catch (error) {
                console.error("❌ Error de red al intentar conectar con get-user-balance:", error);
                document.getElementById('user-balance-display').innerText = "$--.--";
            }
        }

        function renderPackages() {
            const container = document.getElementById("packages-container");
            container.innerHTML = "";

            ffPackages.forEach(pkg => {
                const card = document.createElement("div");
                card.className = "package-card";
                card.innerHTML = `
                    <div class="package-icon"><i class="fas fa-gem"></i></div>
                    <div class="package-name">${pkg.name}</div>
                    <div class="package-price">$${pkg.price.toFixed(2)} c/u</div>
                    
                    <div class="quantity-selector">
                        <label>Cantidad:</label>
                        <button class="qty-btn" onclick="changeQuantity(${pkg.id}, -1)">-</button>
                        <input type="number" id="qty-${pkg.id}" value="1" min="1" max="10" 
                               onchange="updateTotal(${pkg.id}, ${pkg.price})">
                        <button class="qty-btn" onclick="changeQuantity(${pkg.id}, 1)">+</button>
                    </div>
                    
                    <div class="total-price" id="total-${pkg.id}">Total: $${pkg.price.toFixed(2)}</div>
                    
                    <button class="buy-btn" onclick="processPurchase(${pkg.id}, ${pkg.price}, '${pkg.name}', ${pkg.provider_id})">
                        <i class="fas fa-shopping-cart"></i> Comprar PINs
                    </button>
                `;
                container.appendChild(card);
            });
        }

        function changeQuantity(packageId, delta) {
            const input = document.getElementById(`qty-${packageId}`);
            if (!input) return;
            
            let newValue = parseInt(input.value) + delta;
            if (newValue < 1) newValue = 1;
            if (newValue > 10) newValue = 10;
            
            input.value = newValue;
            
            const pkg = ffPackages.find(p => p.id === packageId);
            if (pkg) {
                updateTotal(packageId, pkg.price);
            }
        }

        function updateTotal(packageId, price) {
            const input = document.getElementById(`qty-${packageId}`);
            const totalElement = document.getElementById(`total-${packageId}`);
            
            if (input && totalElement) {
                const quantity = parseInt(input.value) || 1;
                const total = price * quantity;
                totalElement.textContent = `Total: $${total.toFixed(2)}`;
            }
        }

        // Función para extraer PINs de cualquier formato de respuesta
        function extractPins(data) {
            if (!data) return [];
            
            if (data.pins && Array.isArray(data.pins) && data.pins.length > 0) {
                return data.pins;
            }
            
            if (data.provider_response?.api_data?.pins && Array.isArray(data.provider_response.api_data.pins)) {
                return data.provider_response.api_data.pins;
            }
            
            if (data.provider_response?.data?.pins && Array.isArray(data.provider_response.data.pins)) {
                return data.provider_response.data.pins;
            }
            
            if (data.provider_response?.pins && Array.isArray(data.provider_response.pins)) {
                return data.provider_response.pins;
            }
            
            if (data.data && Array.isArray(data.data)) {
                return data.data;
            }
            
            if (data.result && Array.isArray(data.result)) {
                return data.result;
            }
            
            if (data.pin) {
                return [{ code: data.pin }];
            }
            
            if (Array.isArray(data)) {
                return data;
            }
            
            return [];
        }

        // 🔴 FUNCIÓN CORREGIDA: PRIMERO COMPRAR, LUEGO DESCONTAR
        async function processPurchase(packageId, price, packageName, providerId) {
            const input = document.getElementById(`qty-${packageId}`);
            const quantity = parseInt(input ? input.value : 1);
            
            if (quantity < 1 || quantity > 10) {
                alert("La cantidad debe ser entre 1 y 10.");
                return;
            }

            const totalCost = price * quantity;

            // Verificar saldo ANTES de intentar comprar
            if (userBalance < totalCost) {
                alert(`Saldo insuficiente. Requieres $${totalCost.toFixed(2)} y posees $${userBalance.toFixed(2)}. ¡Por favor recarga tu Wallet!`);
                window.location.href = "rechargedwallet.html";
                return;
            }

            const confirmacion = confirm(`¿Confirmas la compra de ${quantity} PIN(s) de ${packageName} por $${totalCost.toFixed(2)}?`);
            if (!confirmacion) return;

            const token = localStorage.getItem("userSessionToken");

            if (!token) {
                alert("Debes iniciar sesión para realizar una compra.");
                localStorage.setItem("redirectAfterLogin", window.location.pathname);
                window.location.href = "login.html";
                return;
            }

            showLoadingModal();

            try {
                // 🔴 PASO 1: PRIMERO COMPRAR LOS PINs (sin descontar saldo)
                const buyResponse = await fetch('/.netlify/functions/buy-pins', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        productId: providerId,
                        quantity: quantity,
                        price: price,
                        productName: packageName
                    })
                });

                const responseText = await buyResponse.text();
                console.log("📥 Respuesta cruda de buy-pins:", responseText);

                let buyData;
                try {
                    buyData = JSON.parse(responseText);
                } catch (parseError) {
                    console.error("❌ Error al parsear JSON:", parseError);
                    throw new Error("El servidor devolvió una respuesta inválida. Por favor, intenta de nuevo.");
                }

                // Si la compra falló, mostrar error SIN descontar saldo
                if (!buyResponse.ok || !buyData.success) {
                    const errorMsg = buyData.message || "Error al comprar los PINs.";
                    console.error("❌ Error en buy-pins:", errorMsg);
                    
                    // Verificar si es error de saldo del proveedor
                    if (buyData.provider_error?.includes('saldo') || errorMsg.includes('saldo insuficiente')) {
                        throw new Error("El proveedor no tiene saldo suficiente. Por favor, contacta con soporte.\n\n✅ Tu saldo NO ha sido descontado.");
                    }
                    
                    throw new Error(errorMsg + "\n\n✅ Tu saldo NO ha sido descontado.");
                }

                // ✅ PASO 2: LA COMPRA FUE EXITOSA - AHORA DESCONTAR SALDO
                console.log("✅ Compra exitosa, descontando saldo...");

                const deductResponse = await fetch('/.netlify/functions/deduct-wallet-balance', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        amountUSD: totalCost,
                        cartDetails: JSON.stringify([{ 
                            item: packageName, 
                            id: packageId, 
                            game: 'Free Fire',
                            quantity: quantity,
                            provider_id: providerId
                        }])
                    })
                });

                const deductData = await deductResponse.json();

                if (!deductResponse.ok) {
                    // Error al descontar saldo - esto es grave porque la compra ya se hizo
                    console.error("❌ Error al descontar saldo:", deductData);
                    throw new Error("La compra se realizó pero hubo un error al descontar tu saldo. Por favor, contacta con soporte.\n\nID de transacción: " + (buyData.transaction_id || 'N/A'));
                }

                // Extraer los PINs
                const pins = extractPins(buyData);
                console.log("🎮 PINs extraídos:", pins);

                // Mostrar los PINs en el modal
                showPinsModal(buyData, packageName, quantity, pins);

                // Actualizar el saldo mostrado
                await fetchUserBalance(token);

            } catch (error) {
                console.error("❌ Error en la transacción:", error);
                closeModal();
                
                // El saldo NO se descontó porque la compra falló o hubo error
                // Solo actualizamos el saldo mostrado para asegurar que está correcto
                await fetchUserBalance(token);
                
                showErrorModal(error.message);
            }
        }

        function showLoadingModal() {
            const modal = document.getElementById('pins-modal');
            const body = document.getElementById('modal-body');
            
            body.innerHTML = `
                <div class="loading-text">
                    <div class="loading-spinner"></div>
                    <p>Procesando tu compra... Por favor espera.</p>
                    <p style="font-size: 0.8rem; color: #888;">Esto puede tomar unos segundos</p>
                </div>
            `;
            
            modal.classList.add('active');
        }

        function showErrorModal(errorMessage) {
            const modal = document.getElementById('pins-modal');
            const body = document.getElementById('modal-body');
            
            // Verificar si el mensaje ya contiene la nota de saldo
            const hasBalanceNote = errorMessage.includes('saldo NO ha sido descontado') || 
                                   errorMessage.includes('Tu saldo no ha sido descontado');
            
            const displayMessage = errorMessage;
            const balanceNote = hasBalanceNote ? '' : '\n\n✅ Tu saldo NO ha sido descontado.';
            
            body.innerHTML = `
                <div class="error-text">
                    <i class="fas fa-exclamation-circle" style="color: #ff6b6b;"></i>
                    <h2 style="color: #ff6b6b;">Error en la Compra</h2>
                    <p style="color: var(--text-color); white-space: pre-line;">${displayMessage}${balanceNote}</p>
                    <button onclick="closePinsModal()" class="buy-btn" style="width: auto; padding: 10px 30px; margin-top: 15px;">
                        <i class="fas fa-times"></i> Cerrar
                    </button>
                </div>
            `;
            
            modal.classList.add('active');
        }

        function showPinsModal(data, packageName, quantity, pins) {
            const modal = document.getElementById('pins-modal');
            const body = document.getElementById('modal-body');
            
            const isSimulation = data.simulation === true || data.provider_response?.sandbox === true;
            const emailSent = data.email_sent !== false;
            
            const simulationBadge = isSimulation ? 
                '<span style="background: #f1c40f; color: #000; padding: 2px 10px; border-radius: 10px; font-size: 0.7rem; margin-left: 10px;">MODO SIMULACIÓN</span>' : '';
            
            let pinsList = '';
            
            if (!pins || pins.length === 0) {
                pinsList = `
                    <div style="text-align:center; padding: 20px;">
                        <p style="color: #f1c40f;">⚠️ No se recibieron PINs del proveedor.</p>
                        <p style="color: #888; font-size: 0.9rem;">Los PINs han sido enviados a tu correo electrónico.</p>
                        ${isSimulation ? '<p style="color: #f1c40f; font-size: 0.8rem;">🔧 Esto es una simulación para pruebas.</p>' : ''}
                    </div>
                `;
            } else {
                pinsList = pins.map((pin, index) => {
                    const pinCode = pin.code || pin.pin || pin;
                    const finalPin = typeof pinCode === 'string' ? pinCode : JSON.stringify(pinCode);
                    return `
                        <div class="pin-item">
                            <span><strong>PIN #${index + 1}</strong></span>
                            <span class="pin-code">${finalPin}</span>
                            <button class="copy-btn" onclick="copyPin('${finalPin.replace(/'/g, "\\'")}')">
                                <i class="fas fa-copy"></i> Copiar
                            </button>
                        </div>
                    `;
                }).join('');
            }

            let emailMessage = '';
            if (!emailSent) {
                emailMessage = `
                    <div class="email-warning">
                        <i class="fas fa-exclamation-triangle"></i>
                        No se pudo enviar el correo automáticamente. 
                        Por favor, contacta a soporte para recibir tus PINs.
                        <br><small>ID de Transacción: ${data.transaction_id || 'N/A'}</small>
                    </div>
                `;
            } else {
                emailMessage = `
                    <p style="color: #2ecc71; font-weight: bold;">
                        <i class="fas fa-check-circle"></i> Los PINs han sido enviados a tu correo electrónico
                    </p>
                `;
            }

            body.innerHTML = `
                <div class="modal-success-icon">${isSimulation ? '🔧' : '✅'}</div>
                <h2 class="modal-title">${isSimulation ? 'Compra en Modo Simulación' : '¡Compra Exitosa!'} ${simulationBadge}</h2>
                <p style="text-align:center; color: var(--text-color); margin-bottom: 20px;">
                    Has comprado <strong>${quantity}</strong> PIN(s) de <strong>${packageName}</strong>
                    ${isSimulation ? '<br><span style="color: #f1c40f; font-size: 0.9rem;">🔧 Modo simulación activo - PINs generados para pruebas</span>' : ''}
                </p>
                <div id="pins-list">${pinsList}</div>
                <div style="text-align: center; margin-top: 20px;">
                    ${emailMessage}
                    <button onclick="closePinsModal()" class="buy-btn" style="width: auto; padding: 10px 30px; margin-top: 10px;">
                        <i class="fas fa-check"></i> Aceptar
                    </button>
                </div>
            `;
            
            modal.classList.add('active');
        }

        function closePinsModal() {
            document.getElementById('pins-modal').classList.remove('active');
        }

        function closeModal() {
            closePinsModal();
        }

        function copyPin(code) {
            navigator.clipboard.writeText(code).then(() => {
                alert('¡PIN copiado al portapapeles!');
            }).catch(() => {
                const textArea = document.createElement('textarea');
                textArea.value = code;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert('¡PIN copiado al portapapeles!');
            });
        }

        // Cerrar modal con Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closePinsModal();
            }
        });

        // Cerrar modal al hacer clic fuera
        document.getElementById('pins-modal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                closePinsModal();
            }
        });
    </script>
</body>
</html>
